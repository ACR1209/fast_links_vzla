name: Sync links from Linktree

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-linktree
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (fetches live Linktree data)
        run: node build.js
        env:
          LINKTREE_URL: ${{ vars.LINKTREE_URL }}
          SITE_TITLE: ${{ vars.SITE_TITLE }}
          SITE_SUBTITLE: ${{ vars.SITE_SUBTITLE }}

      - name: Compare against last known hash
        id: diff
        run: |
          NEW_HASH=$(sha256sum dist/index.html | cut -d' ' -f1)
          OLD_HASH=$(cat .linktree-hash 2>/dev/null || echo "")
          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "No changes, skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NEW_HASH" > .linktree-hash
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push hash (triggers Pages rebuild)
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .linktree-hash
          git commit -m "chore: sync links from Linktree"
          git push
